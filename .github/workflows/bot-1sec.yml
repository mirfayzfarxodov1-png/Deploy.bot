name: Run Telegram Bot 24/7

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pyTelegramBotAPI psutil
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        OWNER_ID: ${{ secrets.OWNER_ID }}
      run: python Deploy.py   # ⬅️ E'tibor bering: Deploy.py (app.py emas!)
