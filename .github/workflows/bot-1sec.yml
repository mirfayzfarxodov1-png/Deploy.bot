name: 24/7 Anime Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/1 * * * *'  # Har 1 daqiqada ishga tushadi
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 6 daqiqa (cron 1 daqiqadan ko'p)
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    # ============================================================
    # CACHE - MA'LUMOTLARNI YUKLASH
    # ============================================================
    - name: 📥 Cache - Ma'lumotlarni yuklash
      uses: actions/cache@v4
      with:
        path: |
          anime_bot.db
          Anime.jpg
          admin.png
          bot_log.txt
          bot_pid.txt
        key: anime-data-v1-${{ github.run_id }}
        restore-keys: |
          anime-data-v1-
    
    - name: 📊 Ma'lumotlar holati
      run: |
        echo "=========================================="
        echo "📂 MA'LUMOTLAR: $(date)"
        echo "=========================================="
        
        sudo apt-get update -qq && sudo apt-get install -y sqlite3 2>/dev/null
        
        if [ -f "anime_bot.db" ]; then
          echo "✅ DB: $(du -h anime_bot.db | cut -f1)"
          MEDIA=$(sqlite3 anime_bot.db "SELECT COUNT(*) FROM media;" 2>/dev/null || echo "0")
          echo "🎬 Media: $MEDIA ta"
        else
          echo "⚠️ DB yo'q"
        fi
        echo "=========================================="
    
    - name: 📦 Kutubxonalar
      run: |
        pip install --quiet aiogram==3.17.0 aiohttp==3.11.11 aiofiles==24.1.0
    
    # ============================================================
    # BOTNI ISHGA TUSHIRISH
    # ============================================================
    - name: 🚀 Bot ishga tushmoqda
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        echo "🚀 BOT START: $(date)"
        
        # Avvalgi bot jarayonini to'xtatish
        if [ -f "bot_pid.txt" ]; then
          OLD_PID=$(cat bot_pid.txt)
          kill -TERM $OLD_PID 2>/dev/null && echo "✅ Eski bot to'xtatildi (PID: $OLD_PID)"
          sleep 0.5
        fi
        
        # Bot faylini tekshirish
        if [ -f "bot.py" ]; then
          BOT_FILE="bot.py"
        else
          echo "❌ bot.py topilmadi!"
          exit 1
        fi
        
        # Botni ishga tushirish
        python $BOT_FILE &
        BOT_PID=$!
        echo $BOT_PID > bot_pid.txt
        
        echo "✅ Bot ishlayapti (PID: $BOT_PID)"
        echo "⏰ Ishga tushgan vaqt: $(date)"
        
        # 5 daqiqa 50 sekund ishlash (6 daqiqadan kam)
        sleep 350
        
        echo "🔴 Bot to'xtatilmoqda: $(date)"
        kill -TERM $BOT_PID 2>/dev/null
        sleep 1
        
        # Agar to'xtamasa majburiy
        if kill -0 $BOT_PID 2>/dev/null; then
          kill -KILL $BOT_PID 2>/dev/null
        fi
        
        echo "✅ Bot to'xtatildi: $(date)"
    
    # ============================================================
    # MA'LUMOTLARNI SAQLASH
    # ============================================================
    - name: 💾 Cache - Ma'lumotlarni saqlash
      if: always()
      uses: actions/cache@v4
      with:
        path: |
          anime_bot.db
          Anime.jpg
          admin.png
          bot_log.txt
          bot_pid.txt
        key: anime-data-v1-${{ github.run_id }}
