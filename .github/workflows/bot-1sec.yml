name: 24/7 Anime Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/1 * * * *'  # Har 1 daqiqada ishga tushadi
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 6  # 6 daqiqa
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    # ============================================================
    # CACHE - MA'LUMOTLARNI YUKLASH
    # ============================================================
    - name: 📥 Cache - Ma'lumotlarni yuklash
      uses: actions/cache@v4
      with:
        path: |
          anime_bot.db
          Anime.jpg
          admin.png
          bot_log.txt
          bot_pid.txt
        key: anime-data-v1-${{ github.run_id }}
        restore-keys: |
          anime-data-v1-
    
    - name: 📊 Ma'lumotlar holati
      run: |
        echo "=========================================="
        echo "📂 MA'LUMOTLAR: $(date)"
        echo "=========================================="
        
        # Fayllarni tekshirish
        echo "📁 Repository fayllari:"
        ls -la *.py 2>/dev/null || echo "  Python fayl yo'q"
        ls -la *.db 2>/dev/null || echo "  Database yo'q"
        ls -la *.jpg *.png 2>/dev/null || echo "  Rasm yo'q"
        
        echo ""
        echo "=========================================="
    
    - name: 📦 Kutubxonalar
      run: |
        pip install --quiet aiogram==3.17.0 aiohttp==3.11.11 aiofiles==24.1.0
    
    # ============================================================
    # BOTNI ISHGA TUSHIRISH
    # ============================================================
    - name: 🚀 Bot ishga tushmoqda
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        echo "🚀 BOT START: $(date)"
        
        # Avvalgi bot jarayonini to'xtatish
        if [ -f "bot_pid.txt" ]; then
          OLD_PID=$(cat bot_pid.txt)
          kill -TERM $OLD_PID 2>/dev/null && echo "✅ Eski bot to'xtatildi (PID: $OLD_PID)"
          sleep 0.5
        fi
        
        # Bot faylini topish (Deploy.py yoki bot.py)
        if [ -f "Deploy.py" ]; then
          BOT_FILE="Deploy.py"
        elif [ -f "bot.py" ]; then
          BOT_FILE="bot.py"
        elif [ -f "main.py" ]; then
          BOT_FILE="main.py"
        else
          echo "❌ Bot fayli topilmadi!"
          echo "📁 Mavjud fayllar:"
          ls -la
          exit 1
        fi
        
        echo "✅ Bot fayli: $BOT_FILE"
        
        # Botni ishga tushirish
        python $BOT_FILE &
        BOT_PID=$!
        echo $BOT_PID > bot_pid.txt
        
        echo "✅ Bot ishlayapti (PID: $BOT_PID)"
        echo "⏰ Ishga tushgan vaqt: $(date)"
        
        # 5 daqiqa 50 sekund ishlash
        sleep 350
        
        echo "🔴 Bot to'xtatilmoqda: $(date)"
        kill -TERM $BOT_PID 2>/dev/null
        sleep 1
        
        if kill -0 $BOT_PID 2>/dev/null; then
          kill -KILL $BOT_PID 2>/dev/null
        fi
        
        echo "✅ Bot to'xtatildi: $(date)"
    
    # ============================================================
    # MA'LUMOTLARNI SAQLASH
    # ============================================================
    - name: 💾 Cache - Ma'lumotlarni saqlash
      if: always()
      uses: actions/cache@v4
      with:
        path: |
          anime_bot.db
          Anime.jpg
          admin.png
          bot_log.txt
          bot_pid.txt
        key: anime-data-v1-${{ github.run_id }}
