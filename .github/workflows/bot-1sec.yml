name: Best 24/7 Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'  # Har 10 daqiqada GitHub tomonidan qayta ishga tushiriladi
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 9  # 9 daqiqa (cron 10 daqiqadan kam)
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache everything
      uses: actions/cache@v3
      with:
        path: |
          deployed_bots
          deploy_bots.db
          bot_logs
          ~/.cache/pip
        key: ${{ runner.os }}-deploy-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-deploy-
          ${{ runner.os }}-
    
    - name: Install
      run: pip install aiogram==3.15.0 psutil==5.9.6 pyTelegramBotAPI==4.14.0
    
    - name: Run (0.1s auto-restart)
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        OWNER_ID: ${{ secrets.OWNER_ID }}
      run: |
        echo "=========================================="
        echo "🚀 BOT STARTING AT $(date)"
        echo "=========================================="
        
        # Bazani tekshirish
        if [ -f "deploy_bots.db" ]; then
          echo "✅ Database found! Size: $(du -h deploy_bots.db | cut -f1)"
          echo "📁 Deployed bots: $(ls -la deployed_bots/ 2>/dev/null | grep -c '^d') ta"
        else
          echo "⚠️ No existing database, starting fresh..."
        fi
        
        # 0.1 sekundda qayta ishga tushadigan loop
        counter=0
        while true; do
          counter=$((counter + 1))
          echo "[$(date)] 🟢 Starting bot instance #$counter"
          
          python Deploy.py &
          BOT_PID=$!
          
          echo "[$(date)] ✅ Bot running (PID: $BOT_PID)"
          
          # 8 daqiqa ishlash (cron 10 daqiqadan kam)
          sleep 480  # 8 daqiqa = 480 sekund
          
          echo "[$(date)] 🔴 Stopping bot (PID: $BOT_PID)..."
          kill -TERM $BOT_PID 2>/dev/null
          sleep 2
          
          echo "[$(date)] 🔄 Restarting in 0.1 seconds..."
          sleep 0.1
        done
